<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Se connecter</title>
    <!-- plugins:css -->
    <link rel="stylesheet" href="assets/css/materialdesignicons.min.css">
    <link rel="stylesheet" href="assets/css/vendor.bundle.base.css">
    <link rel="stylesheet" href="assets/css/style.css">
    
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>
    <div class="container-scroller">
      <div class="container-fluid page-body-wrapper full-page-wrapper">
        <div class="row w-100 m-0">
          <div class="content-wrapper full-page-wrapper d-flex align-items-center auth login-bg">
            <div class="card col-lg-4 mx-auto">
              <div class="card-body px-5 py-5">
                <h3 class="card-title text-center mb-3"><img src="assets/images/logo/logo-white.png" alt="logo celebobo" style="max-width: 50%;"></h3>
                <h3 class="text-center mb-3 mt-3 " style="color:#EF88AD">Inscrivez-vous</h3>
                <form>
                  <div class="form-group">
                    <label>Nom d'utilisateur</label>
                    <input type="text" class="form-control p_input" placeholder="Votre nom d'utilisateur">
                  </div>
                  <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control p_input" placeholder="Entez votre courriel">
                  </div>
                  <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" class="form-control p_input" placeholder="Rentrez votre mot de passe">
                  </div>
                  <div class="form-group">
                    <label>Mot de passe (2)</label>
                    <input type="password" class="form-control p_input" placeholder="Rentrez votre mot de passe">
                  </div>
                  
                  <div class="text-center">
                    <button type="submit" class="btn  btn-block enter-btn" style="background-color: #640D5F;">S'inscrire</button>
                  </div>
                  
                  <p class="sign-up text-center" >Avez-vous déjà un compte?<a href="#"> Connectez-vous</a></p>
                  <p class="terms">En créant votre compte, vous acceptez nos<a href="#"> Termes & Conditions</a></p>
                </form>
              </div>
            </div>
          </div>
          <!-- content-wrapper ends -->
        </div>
        <!-- row ends -->
      </div>
      <!-- page-body-wrapper ends -->
    </div>
    
    <!-- endinject -->
  </body>
</html>
