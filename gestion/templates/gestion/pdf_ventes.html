<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <style>
        body { font-family: "DejaVu Sans"; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #555; padding: 8px; text-align: left; }
        th { background: #eee; }
        </style>
    </head>
    <body>
        <h2>Liste des ventes</h2>
        <table>
            <thead>
                <tr>
                    <th>Produit</th>
                    <th>Utilisateur</th>
                    <th>Prix</th>
                    <th>Méthode</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody>
                {% for v in ventes %}
                    <tr>
                        <td>{{ v.produit_nom }}</td>
                        <td>{{ v.utilisateur.username }}</td>
                        <td>{{ v.price_final|default:v.produit_prix }} USD</td>
                        <td>{{ v.method }}</td>
                        <td>{{ v.date_achat }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </body>
</html>
