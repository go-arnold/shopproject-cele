{% load static %}
<!DOCTYPE html>
<html class="dark" lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link rel="icon" type="image/svg+xml" href="{% static 'sicon-mauve.svg' %}">
    <title>Assistant Achat</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
          rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap"
          rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
          rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
          rel="stylesheet" />
    <link rel="stylesheet" href='{% static "style_general.css" %}'>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#640D5F",
                        "background-dark": "#0A0C1F",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },

                },
            },
        }
    </script>
  </head>
  <body class="font-display bg-background-dark text-white overflow-x-hidden">
    <div class="relative flex min-h-screen w-full flex-col ">
      <div class="absolute inset-0 z-0 bg-gradient-animation"></div>
      <!-- HEADER -->
      {% include "header.html" %}
      <main class="relative z-10 flex flex-1 flex-col justify-center items-center py-6 sm:py-8 text-center px-4">
        <div class="max-w-3xl w-full">
          <h1 class="text-2xl sm:text-4xl md:text-5xl lg:text-6xl font-black text-white mb-3 sm:mb-4">
            Ce service arrive bientôt
          </h1>
          <p class="text-sm sm:text-base text-gray-300 mb-6 sm:mb-8">Soyez les premiers informés lors de notre lancement.</p>
          <!-- COMPTE À REBOURS -->
          <div id="countdown"
               class="flex flex-wrap justify-center gap-2.5 sm:gap-3 md:gap-4 mb-6 sm:mb-8">
            <div class="flex flex-col items-center">
              <div class="bg-black/20 rounded-lg backdrop-blur-sm h-14 w-14 sm:h-16 sm:w-16 md:h-20 md:w-20 flex items-center justify-center">
                <p id="days" class="text-2xl sm:text-3xl md:text-4xl font-bold">15</p>
              </div>
              <span class="text-xs sm:text-sm text-gray-400 mt-1">Jours</span>
            </div>
            <div class="flex flex-col items-center">
              <div class="bg-black/20 rounded-lg backdrop-blur-sm h-14 w-14 sm:h-16 sm:w-16 md:h-20 md:w-20 flex items-center justify-center">
                <p id="hours" class="text-2xl sm:text-3xl md:text-4xl font-bold">10</p>
              </div>
              <span class="text-xs sm:text-sm text-gray-400 mt-1">Heures</span>
            </div>
            <div class="flex flex-col items-center">
              <div class="bg-black/20 rounded-lg backdrop-blur-sm h-14 w-14 sm:h-16 sm:w-16 md:h-20 md:w-20 flex items-center justify-center">
                <p id="minutes" class="text-2xl sm:text-3xl md:text-4xl font-bold">30</p>
              </div>
              <span class="text-xs sm:text-sm text-gray-400 mt-1">Minutes</span>
            </div>
            <div class="flex flex-col items-center">
              <div class="bg-black/20 rounded-lg backdrop-blur-sm h-14 w-14 sm:h-16 sm:w-16 md:h-20 md:w-20 flex items-center justify-center">
                <p id="seconds" class="text-2xl sm:text-3xl md:text-4xl font-bold">00</p>
              </div>
              <span class="text-xs sm:text-sm text-gray-400 mt-1">Secondes</span>
            </div>
          </div>
          <!-- EMAIL INPUT -->
          <label class="flex flex-col h-12 sm:h-14 md:h-16 w-full max-w-xl mx-auto">
            <div class="flex w-full items-stretch rounded-lg h-full">
              <div class="flex items-center justify-center rounded-l-lg border-y border-l border-white/10 bg-black/20 backdrop-blur-sm pl-3 sm:pl-4 pr-2">
                <span class="material-symbols-outlined text-gray-400 text-lg sm:text-xl">mail</span>
              </div>
              <input class="form-input flex w-full rounded-none border-y border-white/10 bg-black/20 backdrop-blur-sm px-3 sm:px-4 text-sm sm:text-base text-white placeholder:text-gray-500 focus:border-primary focus:ring-0"
                     placeholder="Entrez votre adresse e-mail" />
              <div class="flex items-center justify-center rounded-r-lg bg-primary pr-1.5 sm:pr-2">
                <button class="flex h-9 sm:h-10 md:h-12 px-3 sm:px-4 md:px-5 rounded-md text-xs sm:text-sm md:text-base font-bold bg-primary text-white hover:bg-primary/80 transition-colors active:scale-95">
                  Me Prévenir
                </button>
              </div>
            </div>
          </label>
        </div>
      </main>
    </div>
    <!-- TAB-BAR -->
    {% include 'tabbar.html' %}
    <script>
      const initialTime = {
        days: {{ days }},
        hours: {{ hours }},
        minutes: {{ minutes }},
        seconds: {{ seconds }}
      };
      let totalSeconds =
              initialTime.days * 86400 +
              initialTime.hours * 3600 +
              initialTime.minutes * 60 +
              initialTime.seconds;
      const elDays = document.getElementById("days");
      const elHours = document.getElementById("hours");
      const elMinutes = document.getElementById("minutes");
      const elSeconds = document.getElementById("seconds");
    </script>
    <script>
          function updateTimer() {
            if (totalSeconds <= 0) {
              elDays.textContent =
              elHours.textContent =
              elMinutes.textContent =
              elSeconds.textContent =
              "00";
              clearInterval(timer);
              return;
            }
            totalSeconds--;
            const d = Math.floor(totalSeconds / 86400);
            const h = Math.floor((totalSeconds % 86400) / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;
            
            elDays.textContent = d.toString().padStart(2, "0");
            elHours.textContent = h.toString().padStart(2, "0");
            elMinutes.textContent = m.toString().padStart(2, "0");
            elSeconds.textContent = s.toString().padStart(2, "0");
          }

        const timer = setInterval(updateTimer, 1000);
        updateTimer();
        function formatLocalTime(utcString) {
        if (!utcString) return "";
        try {
        const date = new Date(utcString);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);
        if (diffDays === 0) {
        if (diffMins < 1) return "À l'instant";
        if (diffMins < 60) return `Il y a ${diffMins} min`;
        return date.toLocaleTimeString("fr-FR", {
        hour: "2-digit",
        minute: "2-digit",
        });
        }
        if (diffDays === 1) {
        return `Hier ${date.toLocaleTimeString("fr-FR", {
        hour: "2-digit",
        minute: "2-digit",
        })}`;
        }
        if (diffDays < 7) {
        return date.toLocaleDateString("fr-FR", {
        weekday: "short",
        hour: "2-digit",
        minute: "2-digit",
        });
        }
        return date.toLocaleDateString("fr-FR", {
        day: "2-digit",
        month: "short",
        hour: "2-digit",
        minute: "2-digit",
        });
        } catch (e) {
        return utcString;
        }
        }
    </script>
    <script src="{% static 'script_gen.js' %}"></script>
    <script src="{% static 'script/cart.js' %}"></script>
  </body>
</html>
