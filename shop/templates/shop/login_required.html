{% load static %}
<!DOCTYPE html>
<html class="dark" lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/svg+xml" href="{% static 'sicon-mauve.svg' %}">

        <title>Connexion requise</title>

        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
              rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
              rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
              rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
              rel="stylesheet" />
        <link rel="stylesheet" href='{% static "style_general.css" %}'>
        <script id="tailwind-config">
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            primary: "#640D5F",
                            "background-light": "#f8f6f8",
                            "background-dark": "#121826",
                            "surface-dark": "#1F2937",
                            "surface-light": "#FFFFFF",
                            "text-light-primary": "#E5E7EB",
                            "text-light-secondary": "#9CA3AF",
                            "text-dark-primary": "#1F2937",
                            "text-dark-secondary": "#4B5563",
                        },
                        fontFamily: {
                            display: ["Inter", "sans-serif"],
                        },
                        borderRadius: {
                            DEFAULT: "0.25rem",
                            lg: "0.5rem",
                            xl: "0.75rem",
                            full: "9999px",
                        },
                    },
                },
            };
        </script>
        <style>
            body {
                background-color: #12121B;
              
            }
        </style>
    </head>
    <body class="font-display bg-background-light dark:bg-background-dark text-[#E0E0E0]">
        <div class="relative flex h-screen w-full flex-col items-center justify-center overflow-hidden p-4 relative flex min-h-screen flex-col">
            <!-- HEADER -->
            {% include "header.html" %}
        
            <!-- Background Gradient -->
            <div class="absolute inset-0 z-0">
                <div class="absolute inset-0 bg-background-dark"></div>
                <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[150%] h-[80%] bg-[#640D5F]/10 rounded-full blur-3xl"
                     data-alt="Faint purple radial gradient for background effect"></div>
            </div>
            <div class="relative z-10 flex h-full w-full flex-col">
                <div class="flex flex-1 items-center justify-center py-4 sm:py-6 px-4">
                    <div class="flex w-full max-w-md flex-col items-center justify-center text-center">
                        <!-- Icon Lock -->
                        <div class="mb-4 sm:mb-6 flex h-16 w-16 sm:h-20 sm:w-20 items-center justify-center rounded-full bg-white/5 ring-1 ring-white/10">
                            <span class="material-symbols-outlined text-3xl sm:text-4xl text-[#640D5F]">lock</span>
                        </div>
                        <!-- Content -->
                        <div class="flex flex-col items-center gap-3 sm:gap-4">
                            <h1 class="text-2xl sm:text-3xl md:text-4xl font-bold leading-tight tracking-tighter text-white">
                                Vous devez être connecté
                            </h1>
                            <p class="max-w-sm text-sm sm:text-base text-gray-400 leading-relaxed">
                                Pour accéder à cette page et profiter de toutes les fonctionnalités de notre service, une connexion est requise.
                            </p>
                            <!-- Buttons -->
                            <div class="mt-3 sm:mt-4 flex w-full flex-col items-center gap-3 sm:gap-4">
                                <a href="{% url 'account_login' %}" class="w-full">
                                    <button class="flex w-full max-w-xs mx-auto cursor-pointer items-center justify-center overflow-hidden rounded-lg h-11 sm:h-12 px-5 sm:px-6 bg-[#640D5F] text-white text-sm sm:text-base font-bold transition-all duration-200 ease-in-out hover:scale-105 active:scale-95">
                                        <span class="truncate">Se connecter / S'inscrire</span>
                                    </button>
                                </a>
                                <a class="text-xs sm:text-sm text-gray-500 transition-colors hover:text-[#640D5F] hover:underline"
                                   href="{% url 'home' %}">Retour à l'accueil</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {% include "footer.html" %}
        <!-- Mobile Bottom Tab Bar -->
        {% include 'tabbar.html' %}
        <script>
            const count = {{msg_count}} * 1; 
            const countee = {{msg_count}} * 1;
            const cart_count = {{cart_count}} * 1;
        </script>
        <script src="{% static 'script_gen.js' %}"></script>
        <script src="{% static 'script/cart.js' %}"></script>
    </body>
</html>
