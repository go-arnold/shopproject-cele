{% load i18n allauth %}
{% load static %}
<!DOCTYPE html>
<html class="dark" lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% trans "Mot de passe modifié" %}</title>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
              rel="stylesheet" />
        <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#640D5F",
              "background-light": "#f8f5f8",
              "background-dark": "#12121B",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
          },
        },
      };
        </script>
    </head>
    <body class="bg-background-light dark:bg-background-dark font-display text-[#E0E0E0]">
        <div class="flex min-h-screen w-full flex-col items-center justify-center p-4 sm:p-6 lg:p-8">
            <main class="w-full max-w-md">
                <!-- Logo -->
                <div class="mb-3 flex justify-center">
                    <img src="{% static 'static-img/logo-white.png' %}"
                         class="h-16 w-auto sm:h-14"
                         alt="logo">
                </div>
                <!-- Card -->
                <div class="w-full rounded-xl bg-[#1E1E2C]/50 p-6 sm:p-8">
                    <h2 class="text-white text-center text-2xl font-bold mb-3">{% trans "Mot de passe modifié" %}</h2>
                    <p class="text-gray-300 text-sm leading-relaxed text-center">
                        {% trans "Votre mot de passe a été modifié avec succès." %}
                    </p>
                    <div class="mt-6 flex justify-center">
                        <a href="{% url 'account_login' %}"
                           class="px-5 py-3 rounded-lg bg-primary text-white font-semibold hover:bg-primary/90 transition text-sm">
                            {% trans "Se connecter" %}
                        </a>
                    </div>
                </div>
            </main>
        </div>
    </body>
</html>
