    <form method="post" action="{% url 'gestion:delete_product' product.id %}">
        {% csrf_token %}
        <p class="confirmation-text" style="text-align: center; font-size: 14px; color: #6c7293; margin-bottom: 20px;">
            Êtes-vous sûr de vouloir supprimer <strong>"{{ product.name }}"</strong> ? Cette action est irréversible.
        </p>
        <div class="button-group">
            <button type="submit" class="aaa" style="background-color: #640D5F; color:#6c7293; padding: 8px 15px; border-radius: 6px; font-size: 14px; cursor: pointer; text-decoration: none; transition: background 0.2s ease; display: inline-block; border: none;">Oui, supprimer</button>
            <button type="button" class="close-modal-btn" style="background-color: #F4F4F5; color:#6c7293; padding: 8px 15px; border-radius: 6px; font-size: 14px; cursor: pointer; text-decoration: none; transition: background 0.2s ease; display: inline-block; border: none;">Annuler</button>
        </div>
    </form>
</div>
